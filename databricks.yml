bundle:
  name: batch_lakehouse-bundle

include:
  - resources/*.yml
  - resources/*/*.yml

variables:
  catalog:
    default: dev_catalog

targets:
  dev:
    mode: development
    default: true
    presets:
      name_prefix: dev_illakiya
      source_linked_deployment: false
    workspace:
      host: https://dbc-120bd4d3-dc38.cloud.databricks.com

  prod:
    mode: production
    workspace:
      host: https://dbc-120bd4d3-dc38.cloud.databricks.com
      root_path: ../../.bundle/prod/${bundle.name}/${bundle.target}
